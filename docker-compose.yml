name: rawkoon-dev

services:
  db:
    image: postgres:15
    container_name: rawkoon-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rawkoon}
      POSTGRES_USER: ${POSTGRES_USER:-rawkoon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rawkoon_password}
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rawkoon}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rawkoon-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data_dev:/data
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server
      fi
      "
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

volumes:
  db_data_dev:
  redis_data_dev:
