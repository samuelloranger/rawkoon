name: Publish docs to samlo.cloud

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build docs
        env:
          GITHUB_ACTIONS: "true"   # config sets base=/rawkoon/ under Actions
        run: bun run docs:build
      - name: Push built docs to samlo-cloud
        env:
          TOKEN: ${{ secrets.SAMLO_CLOUD_DOCS_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/samuelloranger/samlo-cloud.git" out
          rm -rf out/docs/rawkoon
          mkdir -p out/docs/rawkoon
          cp -r docs/.vitepress/dist/. out/docs/rawkoon/
          cd out
          git config user.name  "docs-bot"
          git config user.email "docs-bot@samlo.cloud"
          git add docs/rawkoon
          git diff --cached --quiet || git commit -m "docs(rawkoon): sync ${GITHUB_SHA::7}"
          git push
