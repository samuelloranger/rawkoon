name: Setup
description: Checkout, Bun, cached install, and TanStack router codegen.

inputs:
  generate-routes:
    description: Run TanStack router codegen (needed for lint/typecheck/test, not format).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.11"

    - uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      env:
        DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    - name: Generate TanStack Router route tree
      if: inputs.generate-routes == 'true'
      shell: bash
      run: cd apps/web && bunx @tanstack/router-cli generate
